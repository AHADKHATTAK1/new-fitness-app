{% extends "base.html" %}

{% block title %}Processing Payment...{% endblock %}

{% block content %}
<style>
    .payment-redirect-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .payment-redirect-card {
        max-width: 500px;
        text-align: center;
    }

    .payment-redirect-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
    }

    .payment-redirect-title {
        margin-bottom: 1rem;
    }

    .payment-redirect-text {
        color: var(--text-muted);
        margin-bottom: 2rem;
    }

    .payment-spinner {
        margin: 2rem auto;
    }

    .payment-form-hidden {
        display: none;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(139, 92, 246, 0.2);
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>

<div class="payment-redirect-wrap">
    <div class="card payment-redirect-card">
        <div class="payment-redirect-icon">⌛</div>
        <h1 class="payment-redirect-title">Redirecting to Payment Gateway...</h1>
        <p class="payment-redirect-text">
            Please wait while we redirect you to secure payment checkout.
        </p>

        <div class="spinner payment-spinner"></div>

        <form id="paymentForm" action="{{ post_url }}" method="POST" class="payment-form-hidden">
            {% for key, value in form_data.items() %}
            <input type="hidden" name="{{ key }}" value="{{ value }}">
            {% endfor %}
        </form>
    </div>
</div>

<script>
    // Auto-submit form after 2 seconds
    setTimeout(function () {
        document.getElementById('paymentForm').submit();
    }, 2000);
</script>
{% endblock %}
