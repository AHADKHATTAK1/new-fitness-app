{% extends "base.html" %}

{% block title %}Scanner - fitnessmanagement{% endblock %}

{% block content %}
<style>
    .scanner-wrap {
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
    }

    .scanner-title {
        margin-bottom: 1.5rem;
    }

    .scanner-reader {
        width: 100%;
        min-height: 400px;
        background: black;
        border-radius: 12px;
        overflow: hidden;
    }

    .scanner-help {
        margin-top: 1rem;
        color: var(--text-muted);
    }

    .scanner-actions {
        margin-top: 2rem;
    }
</style>

<div class="scanner-wrap">
    <h1 class="scanner-title">📷 Scan Member Card</h1>

    <div id="reader" class="scanner-reader">
    </div>

    <p class="scanner-help">Point camera at the QR code on the member's card.</p>

    <div class="scanner-actions">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Stop Scanning</a>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    function onScanSuccess(decodedText, decodedResult) {
        // Handle the scanned code as you like, for example:
        console.log(`Code matched = ${decodedText}`, decodedResult);

        // Redirect to check page
        window.location.href = "{{ url_for('scan_check', member_id='Placeholder') }}".replace('Placeholder', decodedText);

        // Stop scanning
        html5QrcodeScanner.clear();
    }

    function onScanFailure(error) {
        // handle scan failure, usually better to ignore and keep scanning.
        // console.warn(`Code scan error = ${error}`);
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 250 } },
        /* verbose= */ false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
{% endblock %}
