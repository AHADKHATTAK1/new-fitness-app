{% extends "base.html" %}

{% block title %}Reset Password - fitnessmanagement{% endblock %}

{% block content %}
<style>
    .reset-wrap {
        max-width: 450px;
        margin: 4rem auto;
        text-align: center;
    }

    .reset-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .reset-title {
        font-size: 2rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .reset-subtitle {
        color: var(--text-muted);
        margin-top: 0.5rem;
    }

    .reset-form {
        text-align: left;
    }

    .reset-group {
        margin-bottom: 1.5rem;
    }

    .reset-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .reset-input {
        width: 100%;
        padding: 0.85rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-card);
        color: var(--text);
        font-size: 1rem;
    }

    .reset-code-input {
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 0.5rem;
        font-weight: bold;
    }

    .reset-submit {
        width: 100%;
        font-size: 1.1rem;
        padding: 1rem;
        margin-top: 1rem;
    }

    .reset-link-wrap {
        margin-top: 2rem;
        text-align: center;
    }

    .reset-link {
        color: var(--primary);
        text-decoration: none;
    }

    .reset-tip {
        margin-top: 2rem;
        padding: 1rem;
        background: hsla(260, 80%, 60%, 0.1);
        border-radius: 8px;
        border: 1px solid var(--border);
    }

    .reset-tip-text {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0;
    }
</style>

<div class="reset-wrap">
    <div class="card">
        <div class="reset-header">
            <h1 class="reset-title">
                <i class="fa-solid fa-key" aria-hidden="true"></i> Reset Password
            </h1>
            <p class="reset-subtitle">
                Enter the 6-digit code sent to <strong>{{ email }}</strong>
            </p>
        </div>

        <form method="POST" class="reset-form">
            <input type="hidden" name="email" value="{{ email }}">

            <div class="reset-group">
                <label for="code" class="reset-label">Verification
                    Code</label>
                <input type="text" id="code" name="code" required placeholder="123456" maxlength="6" pattern="[0-9]{6}"
                    class="reset-input reset-code-input">
            </div>

            <div class="reset-group">
                <label for="new_password" class="reset-label">New
                    Password</label>
                <input type="password" id="new_password" name="new_password" required placeholder="Enter new password"
                    minlength="6" class="reset-input">
            </div>

            <div class="reset-group">
                <label for="confirm_password" class="reset-label">Confirm
                    Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                    placeholder="Confirm new password" minlength="6" class="reset-input">
            </div>

            <button type="submit" class="btn btn-success reset-submit">
                <i class="fa-solid fa-circle-check" aria-hidden="true"></i> Reset Password
            </button>
        </form>

        <div class="reset-link-wrap">
            <a href="{{ url_for('forgot_password') }}" class="reset-link">
                Didn't receive code? Request new one →
            </a>
        </div>
    </div>

    <div class="reset-tip">
        <p class="reset-tip-text">
            <i class="fa-regular fa-clock" aria-hidden="true"></i> Code expires in 15 minutes from send time
        </p>
    </div>
</div>

<script>
    // Auto-format code input to only allow numbers
    document.getElementById('code').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Check if passwords match
    document.getElementById('confirm_password').addEventListener('input', function (e) {
        const newPass = document.getElementById('new_password').value;
        const confirmPass = this.value;

        if (confirmPass && newPass !== confirmPass) {
            this.setCustomValidity('Passwords do not match');
        } else {
            this.setCustomValidity('');
        }
    });
</script>
{% endblock %}
