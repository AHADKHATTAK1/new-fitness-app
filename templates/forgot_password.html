{% extends "base.html" %}

{% block title %}Forgot Password - fitnessmanagement{% endblock %}

{% block content %}
<style>
    .forgot-wrap {
        max-width: 450px;
        margin: 4rem auto;
        text-align: center;
    }

    .forgot-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .forgot-title {
        font-size: 2rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .forgot-subtitle {
        color: var(--text-muted);
        margin-top: 0.5rem;
    }

    .forgot-form {
        text-align: left;
    }

    .forgot-group {
        margin-bottom: 1.5rem;
    }

    .forgot-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .forgot-input {
        width: 100%;
        padding: 0.85rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-card);
        color: var(--text);
        font-size: 1rem;
    }

    .forgot-submit {
        width: 100%;
        font-size: 1.1rem;
        padding: 1rem;
        margin-top: 1rem;
    }

    .forgot-back-wrap {
        margin-top: 2rem;
        text-align: center;
    }

    .forgot-back-link {
        color: var(--primary);
        text-decoration: none;
    }

    .forgot-tip {
        margin-top: 2rem;
        padding: 1rem;
        background: hsla(260, 80%, 60%, 0.1);
        border-radius: 8px;
        border: 1px solid var(--border);
    }

    .forgot-tip-text {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0;
    }
</style>

<div class="forgot-wrap">
    <div class="card">
        <div class="forgot-header">
            <h1 class="forgot-title">
                <i class="fa-solid fa-shield-halved" aria-hidden="true"></i> Forgot Password
            </h1>
            <p class="forgot-subtitle">
                We'll send you a code to reset your password
            </p>
        </div>

        <form method="POST" class="forgot-form">
            <div class="forgot-group">
                <label for="email" class="forgot-label">Email
                    Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" class="forgot-input">
            </div>

            <button type="submit" class="btn forgot-submit">
                <i class="fa-solid fa-envelope" aria-hidden="true"></i> Send Reset Code
            </button>
        </form>

        <div class="forgot-back-wrap">
            <a href="{{ url_for('auth') }}" class="forgot-back-link">
                ← Back to Login
            </a>
        </div>
    </div>

    <div class="forgot-tip">
        <p class="forgot-tip-text">
            <i class="fa-solid fa-lightbulb" aria-hidden="true"></i> <strong>Tip:</strong> Code expires in 15 minutes
        </p>
    </div>
</div>
{% endblock %}
